name: iSH Build IPA

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  XCODE_VERSION: "15.4"
  SCHEME: "iSH"
  CONFIGURATION: "Release"

jobs:
  build-ipa:
    name: Build unsigned IPA
    runs-on: macos-14

    steps:
      - name: Checkout（含 submodule）
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 选择 Xcode 版本
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: 安装依赖
        run: |
          brew install llvm libarchive meson ninja
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: 恢复 Meson 缓存
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/build-ios
            ~/Library/Caches/meson
          key: meson-ios-${{ runner.os }}-${{ hashFiles('meson.build', 'cross.txt') }}
          restore-keys: meson-ios-${{ runner.os }}-

      - name: 构建并归档（不签名）
        run: |
          xcodebuild \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/iSH.xcarchive" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: 从 .xcarchive 打包未签名 .ipa
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/iSH.xcarchive/Products" -name "*.app" | head -1)
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r "../iSH-unsigned.ipa" Payload

      - name: 上传 .ipa
        uses: actions/upload-artifact@v4
        with:
          name: iSH-unsigned-${{ github.sha }}
          path: ${{ runner.temp }}/iSH-unsigned.ipa
          retention-days: 30
